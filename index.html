<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naktis Mokykloje</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('https://raw.githubusercontent.com/JustDannie200/Naktis-Mokykloje-Klausyminas-/main/download%20(3).gif') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        /* LOGO APDIRBIMAS */
        .logo-img {
            max-width: 90%;
            height: auto;
            mix-blend-mode: screen; 
            margin-bottom: 20px;
        }

        .card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .menu-btn {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 15px;
            margin: 12px 0;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .menu-btn:hover {
            background: white;
            color: black;
        }

        input { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid white; background: transparent; color: white; text-align: center;
            font-size: 16px;
        }

        .hidden { display: none; }
        
        #reader { border-radius: 15px; overflow: hidden; border: 2px solid white !important; margin-bottom: 10px; }
        
        .status-badge { padding: 10px; border-radius: 8px; margin-bottom: 15px; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .unlocked { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }

        .sponsors {
            margin-top: 40px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://raw.githubusercontent.com/JustDannie200/Naktis-Mokykloje-Klausyminas-/main/Screenshot%202026-03-14%20152549.jpg" class="logo-img">

    <div class="card">
        <div id="main-menu">
            <button class="menu-btn" onclick="showSection('team-selection')">Pasirinkti komandą</button>
            <button class="menu-btn" onclick="showSection('admin-login')">GŠG Mokinių taryba</button>
            <button class="menu-btn" onclick="showSection('qr-generator')">QR kodų darymas</button>
        </div>

        <div id="team-selection" class="hidden">
            <h3>Įrašykite pavadinimą</h3>
            <input type="text" id="team-name-input" placeholder="KOMANDA...">
            <button class="menu-btn" onclick="startQuiz()">PRADĖTI</button>
            <button onclick="showSection('main-menu')" style="background:none; border:none; color:white; cursor:pointer; margin-top:10px;">Atgal</button>
        </div>

        <div id="quiz-step" class="hidden">
            <div id="lock-status" class="status-badge">🔒 RASKITE QR KODĄ</div>
            
            <div id="scanner-container" class="hidden">
                <div id="reader"></div>
                <button class="menu-btn" onclick="stopScanner()">Atšaukti skenavimą</button>
            </div>

            <div id="quiz-content" class="hidden">
                <p id="riddle-text" style="font-size: 1.2em; margin-bottom: 20px;"></p>
                <input type="text" id="ans-input" placeholder="Atsakymas...">
                <button class="menu-btn" onclick="checkAnswer()">Tikrinti</button>
            </div>

            <button id="open-scanner-btn" class="menu-btn" style="background: white; color: black;" onclick="startScanner()">📷 SKENUOTI KODĄ</button>

            <div id="next-loc" class="hidden">
                <h3 style="color: #22c55e;">TEISINGAI!</h3>
                <p>Kita stotelė:</p>
                <p id="location-text" style="font-weight: bold; font-size: 1.1em;"></p>
                <button class="menu-btn" onclick="prepareNext()">EITI TOLIAU</button>
            </div>
        </div>

        <div id="admin-login" class="hidden">
            <h3>PRISIJUNGIMAS</h3>
            <input type="text" id="admin-user" placeholder="Vartotojas">
            <input type="password" id="admin-pass" placeholder="Slaptažodis">
            <button class="menu-btn" onclick="checkAdmin()">PRISIJUNGTI</button>
            <button class="menu-btn" onclick="showSection('main-menu')">ATGAL</button>
        </div>

        <div id="admin-panel" class="hidden">
            <h3>REZULTATAI</h3>
            <div id="results-list" style="text-align: left; margin-bottom: 20px;"></div>
            <button class="menu-btn" onclick="showSection('main-menu')">ATSIJUNGTI</button>
        </div>

        <div id="qr-generator" class="hidden">
            <h3>KURTI QR</h3>
            <input type="text" id="qr-url" placeholder="Raktinis žodis">
            <button class="menu-btn" onclick="generateQR()">GENERUOTI</button>
            <div id="qrcode" style="background: white; padding: 10px; display: inline-block; margin-top: 10px;"></div>
            <button class="menu-btn" onclick="showSection('main-menu')">ATGAL</button>
        </div>
    </div>

    <div class="sponsors">
        Pagrindiniai rėmėjai:
        <div style="margin-top: 5px; font-weight: bold; opacity: 1;">GŠG Taryba</div>
    </div>
</div>

<script>
    let currentTeam = "";
    let qIdx = 0;
    let scanner;
    let gameResults = JSON.parse(localStorage.getItem('gsg_results')) || {};

    const quizData = [
        { q: "Aš turiu šimtus lapų, bet nesu medis?", a: "knyga", key: "kodas1", loc: "Prie mokyklos bibliotekos durų" },
        { q: "Aš turiu tinklą, bet žuvies negaudau?", a: "krepsinis", key: "kodas2", loc: "Sporto salės kairysis kampas" },
        { q: "Kuo daugiau atimi, tuo didesnis?", a: "duobe", key: "kodas3", loc: "Rūbinė, 5 spintelė" }
    ];

    function showSection(id) {
        document.querySelectorAll('.card > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function startQuiz() {
        currentTeam = document.getElementById('team-name-input').value;
        if(!currentTeam) return alert("Įveskite pavadinimą!");
        showSection('quiz-step');
        prepareNext();
    }

    function startScanner() {
        document.getElementById('scanner-container').classList.remove('hidden');
        document.getElementById('open-scanner-btn').classList.add('hidden');
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => {
                if(decodedText.trim() === quizData[qIdx].key) {
                    unlockQuestion();
                    stopScanner();
                } else {
                    alert("Netinkamas kodas! Ieškokite kito.");
                }
            }
        ).catch(err => alert("Kameros klaida. Suteikite leidimą kamerai!"));
    }

    function stopScanner() {
        if(scanner) {
            scanner.stop().then(() => {
                document.getElementById('scanner-container').classList.add('hidden');
                document.getElementById('open-scanner-btn').classList.remove('hidden');
            });
        }
    }

    function unlockQuestion() {
        const status = document.getElementById('lock-status');
        status.innerText = "🔓 KLAUSIMAS ATRAKINTAS";
        status.className = "status-badge unlocked";
        document.getElementById('quiz-content').classList.remove('hidden');
        document.getElementById('riddle-text').innerText = quizData[qIdx].q;
        document.getElementById('open-scanner-btn').classList.add('hidden');
    }

    function checkAnswer() {
        const val = document.getElementById('ans-input').value.toLowerCase().trim();
        if(val === quizData[qIdx].a) {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('next-loc').classList.remove('hidden');
            document.getElementById('location-text').innerText = quizData[qIdx].loc;
            gameResults[currentTeam] = (gameResults[currentTeam] || 0) + 1;
            localStorage.setItem('gsg_results', JSON.stringify(gameResults));
        } else {
            alert("Neteisingas atsakymas! Bandyk dar kartą.");
        }
    }

    function prepareNext() {
        if(qIdx >= quizData.length - 1 && !document.getElementById('next-loc').classList.contains('hidden')) {
            alert("SVEIKINAME! JŪS ĮVEIKĖTE VISAS UŽDUOTIS.");
            location.reload();
            return;
        }
        if(!document.getElementById('next-loc').classList.contains('hidden')) qIdx++;
        
        document.getElementById('next-loc').classList.add('hidden');
        document.getElementById('quiz-content').classList.add('hidden');
        document.getElementById('open-scanner-btn').classList.remove('hidden');
        const status = document.getElementById('lock-status');
        status.innerText = "🔒 RASKITE QR KODĄ";
        status.className = "status-badge";
        document.getElementById('ans-input').value = "";
    }

    function checkAdmin() {
        if(document.getElementById('admin-user').value === "admin" && document.getElementById('admin-pass').value === "gsg2026") {
            renderResults();
            showSection('admin-panel');
        } else { alert("Neteisingi duomenys"); }
    }

    function renderResults() {
        const list = document.getElementById('results-list');
        list.innerHTML = "";
        for (let t in gameResults) {
            list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #444"><strong>${t}:</strong> ${gameResults[t]} taškai</div>`;
        }
    }

    function generateQR() {
        const txt = document.getElementById('qr-url').value;
        if(!txt) return;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: txt, width: 128, height: 128 });
    }
</script>
</body>
</html>
